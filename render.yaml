services:
  - type: web
    name: expense-tracker-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionURI
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: expense-tracker-db
    plan: free
    region: oregon
